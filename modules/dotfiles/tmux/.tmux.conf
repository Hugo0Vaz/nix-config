#==============================================================================#
#       Rebinding the prefix to CTRL-A
#==============================================================================#
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix
set-window-option -g mode-keys vi

#==============================================================================#
#       General options
#==============================================================================#
set-option -sg escape-time 10
set -g default-terminal "tmux-256color"
set-option -g mouse on
set-option -g focus-events on
set -a terminal-features 'xterm-256color:RGB'
set -g extended-keys on
set -g extended-keys-format csi-u

#==============================================================================#
#       Keybins
#==============================================================================#
bind o display-popup -E "tmux-sessionizer"
bind f display-popup -E -d "#{pane_current_path}" "$SHELL"

unbind-key s
bind-key "s" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

unbind-key S
bind-key S choose-tree -s

bind r source-file ~/.tmux.conf \; display "Reloaded!"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

#==============================================================================#
#       Status Bar - Gruvbox Theme (ugoline-matching)
#==============================================================================#
set -g status on
set -g status-position top
set -g base-index 1
set -g status-interval 5
set -g status-justify left
setw -g monitor-activity on
set -g visual-activity on

set -g status-bg "#32302f"    # dark0_soft
set -g status-fg "#d5c4a1"    # light2

set -g window-status-format " #[fg=#a89984] [#I] #W "
set -g window-status-current-format " #[fg=#fabd2f] [#I] #W "

# Left: session name (like lualine section a in normal mode)
set -g status-left-length 60
set -g status-left "#[fg=#282828,bg=#a89984] #S "

# Right: pane path (like a right-side section b variant)
set -g status-right-length 60
set -g status-right "#[fg=#d5c4a1,bg=#504945] #(tmux-pane-path) "
